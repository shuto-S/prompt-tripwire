name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.144.4

      - name: Check tool versions
        run: npm run check:versions

      - name: Check Codex schema drift
        run: npm run check:schema

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Check pure package boundaries
        run: npm run check:boundaries

      - name: Check dependency licenses
        run: npm run check:licenses

      - name: Check macOS security regression
        run: npm run check:security

      - name: Check Codex Plugin bundle
        run: npm run check:plugin

      - name: Check P0 requirement traceability
        run: npm run check:traceability

      - name: Check submission content
        run: npm run check:submission

      - name: Check generated diff
        run: npm run check:diff

  release-artifact:
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Verify reproducible release packaging
        run: npm run check:release-reproducibility

      - name: Verify release artifact
        run: npm run verify:release
