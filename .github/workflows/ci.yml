name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.144.4

      - name: Check tool versions
        run: npm run check:versions

      - name: Check Codex schema drift
        run: npm run check:schema

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Check pure package boundaries
        run: npm run check:boundaries

      - name: Check dependency licenses
        run: npm run check:licenses

      - name: Check generated diff
        run: npm run check:diff
